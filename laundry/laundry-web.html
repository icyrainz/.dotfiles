<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>laundry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0d1017;
    --bg-panel: #131820;
    --bg-surface: #1a2030;
    --border: #1e2a3a;
    --border-active: #2a3a50;
    --text: #a0b0c8;
    --text-dim: #4a5a70;
    --text-bright: #d0dce8;
    --accent: #4a9eff;
    --accent-glow: rgba(74, 158, 255, 0.15);
    --warn: #e8a84c;
    --warn-glow: rgba(232, 168, 76, 0.15);
    --danger: #e85c5c;
    --success: #4ce890;
    --purple: #a78bfa;
    --mono: 'IBM Plex Mono', 'JetBrains Mono', monospace;
    --display: 'Space Grotesk', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg-deep); color: var(--text); font-family: var(--mono);
    font-size: 12px; height: 100vh; overflow: hidden;
  }
  #grid {
    display: grid; gap: 2px; height: 100vh; padding: 2px;
    background: var(--bg-deep);
  }

  /* Tiles */
  .tile {
    background: var(--bg-panel); display: flex; flex-direction: column;
    min-height: 0; overflow: hidden; border-radius: 4px;
    border: 1px solid var(--border);
    transition: opacity 0.4s ease, border-color 0.4s ease;
  }
  .tile.state-idle { opacity: 0.7; }
  .tile.state-idle:hover,
  .tile.state-idle:focus-within { opacity: 1; }
  .tile.state-thinking { border-color: var(--accent); }
  .tile.state-thinking .tile-header { border-bottom-color: var(--accent); }
  .tile.state-permission { border-color: var(--warn); }
  .tile.state-permission .tile-header { border-bottom-color: var(--warn); }

  /* Header */
  .tile-header {
    padding: 8px 10px; font-family: var(--display); font-weight: 500;
    color: var(--text-bright);
    border-bottom: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-surface);
  }
  .tile-header .title-left {
    min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; font-size: 13px; letter-spacing: -0.02em;
  }
  .tile-header .project {
    color: var(--text-dim); margin-right: 6px;
    text-transform: uppercase; font-size: 10px; letter-spacing: 0.05em;
  }
  .tile-header .age {
    color: var(--text-dim); font-size: 10px; font-family: var(--mono);
    flex-shrink: 0;
  }

  /* Link pills */
  .tile-header .links { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .tile-header .links a,
  .tile-header .links a:link,
  .tile-header .links a:visited,
  .tile-header .links a:active {
    text-decoration: none !important; font-size: 10px; font-weight: 600;
    font-family: var(--mono);
    padding: 2px 8px; border-radius: 3px; white-space: nowrap;
    letter-spacing: 0.02em; transition: transform 0.1s;
  }
  .tile-header .links a:hover { transform: translateY(-1px); }
  .tile-header .links a.jira { background: var(--accent) !important; color: var(--bg-deep) !important; }
  .tile-header .links a.pr-PENDING,
  .tile-header .links a.pr-REVIEW_REQUIRED { background: var(--warn) !important; color: var(--bg-deep) !important; }
  .tile-header .links a.pr-APPROVED { background: var(--success) !important; color: var(--bg-deep) !important; }
  .tile-header .links a.pr-CHANGES_REQUESTED { background: var(--danger) !important; color: var(--bg-deep) !important; }
  .tile-header .links a.pr-MERGED { background: var(--purple) !important; color: var(--bg-deep) !important; }
  .tile-header .links a.pr-CLOSED { background: var(--border-active) !important; color: var(--text-dim) !important; }

  /* Content */
  .tile-content {
    flex: 1; overflow-y: auto; padding: 8px 10px;
    white-space: pre-wrap; overflow-wrap: break-word;
    font-size: 11px; line-height: 1.5; color: var(--text);
  }
  .tile-content::-webkit-scrollbar { width: 3px; }
  .tile-content::-webkit-scrollbar-track { background: transparent; }
  .tile-content::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 3px; }

  /* Input */
  .tile-input {
    border-top: 1px solid var(--border); padding: 6px 8px; flex-shrink: 0;
    display: flex; gap: 4px; background: var(--bg-surface);
  }
  .tile-input input {
    flex: 1; background: var(--bg-deep); color: var(--text-bright);
    border: 1px solid var(--border); padding: 5px 8px;
    font-family: var(--mono); font-size: 11px;
    border-radius: 3px; outline: none; transition: border-color 0.2s;
  }
  .tile-input input:focus { border-color: var(--accent); background: var(--bg-panel); }
  .tile-input button {
    background: var(--border-active); color: var(--accent); border: none;
    padding: 5px 10px; cursor: pointer; border-radius: 3px;
    font-family: var(--mono); font-size: 11px; transition: background 0.15s;
  }
  .tile-input button:hover { background: var(--accent); color: var(--bg-deep); }

  /* Dropdown menu */
  .tile-menu { position: relative; flex-shrink: 0; }
  .tile-menu-btn {
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    font-size: 14px; padding: 2px 4px; line-height: 1; border-radius: 3px;
    transition: color 0.15s;
  }
  .tile-menu-btn:hover { color: var(--text-bright); }
  .tile-dropdown {
    display: none; position: absolute; left: 0; top: 100%; z-index: 10;
    background: var(--bg-surface); border: 1px solid var(--border-active);
    border-radius: 4px; padding: 2px 0; white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .tile-dropdown.open { display: block; }
  .tile-dropdown button {
    display: block; width: 100%; text-align: left; background: none;
    border: none; color: var(--text); padding: 5px 12px; cursor: pointer;
    font-family: var(--mono); font-size: 11px; transition: background 0.1s;
  }
  .tile-dropdown button:hover { background: var(--border); }
  .tile-dropdown button.danger { color: var(--danger); }
  .tile-dropdown button.danger:hover { background: rgba(232,92,92,0.1); }
  .tile-dropdown hr { border: none; border-top: 1px solid var(--border); margin: 2px 0; }

  /* Empty state */
  #empty {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; color: var(--text-dim); font-size: 14px;
    font-family: var(--display);
  }

  /* FAB */
  .fab-group { position: fixed; bottom: 20px; right: 20px; z-index: 20; display: flex; gap: 10px; }
  .fab {
    color: var(--bg-deep); border: none;
    width: 44px; height: 44px; border-radius: 12px;
    font-size: 20px; cursor: pointer; line-height: 1;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .fab:hover { transform: translateY(-2px); }
  #add-btn {
    background: var(--accent);
    box-shadow: 0 4px 16px rgba(74,158,255,0.3); font-size: 24px;
  }
  #paused-btn {
    background: var(--warn);
    box-shadow: 0 4px 16px rgba(232,168,76,0.3); font-size: 16px;
    font-family: var(--mono); font-weight: 600;
  }
  #paused-btn .count {
    font-size: 13px;
  }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 30;
    background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-panel); border: 1px solid var(--border-active);
    border-radius: 8px; padding: 24px; width: 560px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  .modal h3 {
    color: var(--text-bright); margin-bottom: 16px; font-size: 15px;
    font-family: var(--display); font-weight: 700; letter-spacing: -0.02em;
  }
  .modal label {
    display: block; color: var(--text-dim); font-size: 10px;
    margin-bottom: 4px; margin-top: 12px;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .modal input, .modal select {
    width: 100%; background: var(--bg-deep); color: var(--text-bright);
    border: 1px solid var(--border); padding: 8px 10px;
    font-family: var(--mono); font-size: 12px;
    border-radius: 4px; outline: none; transition: border-color 0.2s;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .modal-actions button {
    padding: 7px 16px; border: none; border-radius: 4px; cursor: pointer;
    font-family: var(--mono); font-size: 12px; font-weight: 500;
    transition: transform 0.1s;
  }
  .modal-actions button:hover { transform: translateY(-1px); }
  .modal-actions .primary { background: var(--accent); color: var(--bg-deep); }
  .modal-actions .secondary { background: var(--border-active); color: var(--text); }
  .paused-list { list-style: none; max-height: 400px; overflow-y: auto; }
  .paused-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .paused-item:last-child { border-bottom: none; }
  .paused-item .info { min-width: 0; overflow: hidden; }
  .paused-item .name {
    color: var(--text-bright); font-size: 12px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .paused-item .meta { color: var(--text-dim); font-size: 10px; margin-top: 2px; }
  .paused-item .actions { display: flex; gap: 6px; flex-shrink: 0; margin-left: 12px; }
  .paused-item .actions button {
    border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer;
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    transition: transform 0.1s;
  }
  .paused-item .actions button:hover { transform: translateY(-1px); }
  .paused-item .actions .resume { background: var(--accent); color: var(--bg-deep); }
  .paused-item .actions .done { background: var(--success); color: var(--bg-deep); }
  .paused-item .actions .cancel { background: var(--border-active); color: var(--text); }
</style>
</head>
<body>
<div id="grid"></div>
<div id="empty" style="display:none">No active tasks</div>
<div class="fab-group">
  <button class="fab" id="paused-btn" onclick="openPausedModal()" style="display:none"><span class="count"></span></button>
  <button class="fab" id="add-btn" onclick="openAddModal()">+</button>
</div>
<div class="modal-overlay" id="paused-modal">
  <div class="modal">
    <h3>Paused sessions</h3>
    <ul class="paused-list" id="paused-list"></ul>
    <div class="modal-actions">
      <button class="secondary" onclick="closePausedModal()">Close</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>New task</h3>
    <label>Prompt</label>
    <input type="text" id="add-prompt" placeholder="what to work on...">
    <label>Project</label>
    <select id="add-project"></select>
    <div class="modal-actions">
      <button class="secondary" onclick="closeAddModal()">Cancel</button>
      <button class="primary" onclick="submitAddTask()">Create</button>
    </div>
  </div>
</div>
<script>
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const tiles = {};
let autoScroll = {};

function renderLinks(links) {
  return (links || []).map(l => {
    const cls = l.type === 'jira' ? 'jira' : `pr-${l.status || 'PENDING'}`;
    return `<a href="${esc(l.url)}" target="_blank" class="${cls}">${esc(l.label)}</a>`;
  }).join('');
}

function updateGrid(tasks) {
  document.title = tasks.length ? `laundry (${tasks.length})` : 'laundry';

  if (tasks.length === 0) {
    grid.style.display = 'none';
    empty.style.display = 'flex';
    return;
  }
  grid.style.display = 'grid';
  empty.style.display = 'none';

  let cols;
  if (tasks.length <= 1) cols = 1;
  else if (tasks.length <= 4) cols = 2;
  else if (tasks.length <= 6) cols = 3;
  else if (tasks.length <= 8) cols = 4;
  else cols = Math.ceil(Math.sqrt(tasks.length));
  const rows = Math.ceil(tasks.length / cols);
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

  const lastRowCount = tasks.length % cols || cols;
  const lastRowStart = tasks.length - lastRowCount;
  const seen = new Set();

  tasks.forEach(t => {
    seen.add(t.id);
    if (!tiles[t.id]) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.innerHTML = `
        <div class="tile-header">
          <span class="tile-menu">
            <button class="tile-menu-btn" onclick="toggleMenu(this)">⋮</button>
            <div class="tile-dropdown">
              <button onclick="taskAction('${t.id}','pause',this)">Pause</button>
              <button onclick="taskAction('${t.id}','done',this)">Done</button>
              <button onclick="taskAction('${t.id}','cancel',this)">Cancel</button>
            </div>
          </span>
          <span class="title-left"><span class="project">${esc(t.project)}</span>${esc(t.title)}</span>
          <span class="age">${esc(t.age || '')}</span>
          <span class="links">${renderLinks(t.links)}</span>
        </div>
        <div class="tile-content" id="content-${t.id}"></div>
        <div class="tile-input">
          <input type="text" placeholder="send input..." id="input-${t.id}"
                 onkeydown="if(event.key==='Enter')sendInput('${t.id}',this.value,this)">
        </div>`;
      grid.appendChild(tile);
      tiles[t.id] = tile;
      autoScroll[t.id] = true;

      const content = tile.querySelector('.tile-content');
      content.addEventListener('scroll', () => {
        const atBottom = content.scrollHeight - content.scrollTop - content.clientHeight < 30;
        autoScroll[t.id] = atBottom;
      });
    }

    tiles[t.id].className = `tile state-${t.state || 'idle'}`;

    const titleEl = tiles[t.id].querySelector('.title-left');
    if (titleEl) {
      titleEl.innerHTML = `<span class="project">${esc(t.project)}</span>${esc(t.title)}`;
    }

    const content = document.getElementById('content-' + t.id);
    if (content && t.content !== undefined) {
      content.textContent = t.content;
      if (autoScroll[t.id]) {
        content.scrollTop = content.scrollHeight;
      }
    }

    const ageEl = tiles[t.id].querySelector('.age');
    if (ageEl) ageEl.textContent = t.age || '';

    const linksEl = tiles[t.id].querySelector('.links');
    if (linksEl && t.links) {
      linksEl.innerHTML = renderLinks(t.links);
    }
  });

  if (lastRowCount < cols) {
    const spanSize = Math.floor(cols / lastRowCount);
    const extra = cols % lastRowCount;
    tasks.slice(lastRowStart).forEach((t, i) => {
      const span = spanSize + (i < extra ? 1 : 0);
      tiles[t.id].style.gridColumn = `span ${span}`;
    });
    tasks.slice(0, lastRowStart).forEach(t => {
      tiles[t.id].style.gridColumn = '';
    });
  } else {
    tasks.forEach(t => { tiles[t.id].style.gridColumn = ''; });
  }

  Object.keys(tiles).forEach(id => {
    if (!seen.has(id)) {
      tiles[id].remove();
      delete tiles[id];
      delete autoScroll[id];
    }
  });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function sendInput(taskId, text, input) {
  fetch('/send', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({task_id: taskId, text: text})
  }).then(r => {
    if (!r.ok) input.style.borderColor = 'var(--danger)';
    else input.style.borderColor = '';
  }).catch(() => { input.style.borderColor = 'var(--danger)'; });
  input.value = '';
}

function toggleMenu(btn) {
  const dropdown = btn.nextElementSibling;
  const wasOpen = dropdown.classList.contains('open');
  document.querySelectorAll('.tile-dropdown.open').forEach(d => d.classList.remove('open'));
  if (!wasOpen) dropdown.classList.add('open');
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.tile-menu')) {
    document.querySelectorAll('.tile-dropdown.open').forEach(d => d.classList.remove('open'));
  }
});

function taskAction(taskId, action, btn) {
  document.querySelectorAll('.tile-dropdown.open').forEach(d => d.classList.remove('open'));
  fetch('/action', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({task_id: taskId, action: action})
  });
}

function openAddModal() {
  fetch('/projects').then(r => r.json()).then(dirs => {
    const sel = document.getElementById('add-project');
    sel.innerHTML = dirs.map(d => `<option value="${esc(d)}">${esc(d)}</option>`).join('');
  });
  document.getElementById('add-prompt').value = '';
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('add-prompt').focus();
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
}

function submitAddTask() {
  const prompt = document.getElementById('add-prompt').value;
  const project = document.getElementById('add-project').value;
  closeAddModal();
  fetch('/add', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({prompt: prompt, project: project})
  });
}

function openPausedModal() {
  fetch('/paused').then(r => r.json()).then(tasks => {
    const list = document.getElementById('paused-list');
    if (!tasks.length) {
      list.innerHTML = '<li style="color:var(--text-dim);padding:12px 0">No paused sessions</li>';
      return;
    }
    list.innerHTML = tasks.map(t => `
      <li class="paused-item">
        <div class="info">
          <div class="name">${esc(t.title)}</div>
          <div class="meta">${esc(t.project)} &middot; ${esc(t.age)}</div>
        </div>
        <div class="actions">
          <button class="resume" onclick="pausedAction('${t.id}','open')">Resume</button>
          <button class="done" onclick="pausedAction('${t.id}','done')">Done</button>
          <button class="cancel" onclick="pausedAction('${t.id}','cancel')">Cancel</button>
        </div>
      </li>
    `).join('');
  });
  document.getElementById('paused-modal').classList.add('open');
}

function closePausedModal() {
  document.getElementById('paused-modal').classList.remove('open');
}

function pausedAction(taskId, action) {
  fetch('/action', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({task_id: taskId, action: action})
  }).then(() => {
    if (action === 'open') closePausedModal();
    else openPausedModal(); // refresh the list
  });
}

document.getElementById('paused-modal').addEventListener('click', (e) => {
  if (e.target.classList.contains('modal-overlay')) closePausedModal();
});
document.getElementById('add-modal').addEventListener('click', (e) => {
  if (e.target.classList.contains('modal-overlay')) closeAddModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeAddModal(); closePausedModal(); }
});

function connect() {
  const es = new EventSource('/events');
  es.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      updateGrid(d.tasks || d);
      // Update paused button
      const btn = document.getElementById('paused-btn');
      if (d.paused_count > 0) {
        btn.style.display = '';
        btn.querySelector('.count').textContent = d.paused_count;
      } else {
        btn.style.display = 'none';
      }
    } catch(err) { console.error(err); }
  };
  es.onerror = () => {
    es.close();
    setTimeout(connect, 2000);
  };
}
connect();
</script>
</body>
</html>
