- defaults:
    link:
      create: true
      relink: true
    shell:
      stderr: true

- clean: ["~"]

- link:
    ~/.config/nvim:
      path: nvim
    ~/.config/tmux:
      path: tmux
    ~/.config/wezterm:
      path: wezterm
    ~/.config/fish/config.fish:
      path: fish/config.fish
    ~/.config/fish/include:
      path: fish/include
    ~/.config/fish/fish_plugins:
      path: fish/fish_plugins
    ~/.config/fish/completions/:
      path: fish/completions/*
      glob: true
    ~/.config/fish/functions/:
      path: fish/functions/*
      glob: true
    ~/.hammerspoon:
      path: hammerspoon
      if: '[ "$(uname)" = "Darwin" ]'
    ~/.config/doom:
      path: doom
    ~/.ideavimrc:
      path: ideavim/.ideavimrc
    ~/.zshrc:
      path: zsh/.zshrc
    ~/.bashrc:
      path: bash/.bashrc
    ~/.bash_profile:
      path: bash/.bash_profile
    ~/.bash_custom:
      path: bash/.bash_custom
    ~/.config/opencode/opencode.json:
      path: opencode/opencode.json
      if: '[ -f ~/.akio-personal ]'
    ~/.claude/CLAUDE.md:
      path: claude/CLAUDE.md
    ~/.claude/settings.json:
      path: claude/settings.json
    ~/.claude/statusline-command.sh:
      path: claude/statusline-command.sh
    ~/.claude/claude-hook.sh:
      path: claude/claude-hook.sh
    ~/.claude/hooks.d:
      path: claude/hooks.d
    ~/.claude/hooks/peon-ping/config.json:
      path: peon-ping/config.json
    ~/.pi/agent/settings.json:
      path: pi/settings.json
    ~/.pi/agent/models.json:
      path: pi/models.json
    ~/.pi/agent/extensions:
      path: pi/extensions
    ~/.openpeon/config.json:
      path: peon-ping/config.json
    ~/.config/opencode/peon-ping/config.json:
      path: peon-ping/config.json
    ~/.config/kitty/kitty.conf:
      path: kitty/kitty.conf
      if: command -v kitty > /dev/null
    ~/.config/ghostty/config:
      path: ghostty/config
      if: command -v ghostty > /dev/null
    ~/.local/bin/laundry:
      path: laundry/laundry.py
    ~/.config/tmux/laundry-new.sh:
      path: laundry/laundry-new.sh
    ~/.config/television:
      path: .config/television
    ~/.config/sesh/sesh.toml:
      path: sesh/sesh.toml
    ~/.config/lazygit/config.yml:
      path: lazygit/config.yml
    ~/.config/git/hooks/:
      path: git/hooks/*
      glob: true

- shell:
    - [git submodule update --init --recursive, Setting up submodules]
    - [./install_tools.sh, Setting up tools]
    - [tmux/install.sh, Setting up tmux plugins]
    - [fish/install.sh, Setting up fish plugins]
    - [peon-ping/install.sh, Setting up peon-ping sound pack]
    - [claude/install.sh, Setting up Claude Code]
