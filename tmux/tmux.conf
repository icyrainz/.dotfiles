tmux_dir="~/.config/tmux"
tmux_conf_dir="$tmux_dir/conf"
tmux_plugins_dir="$tmux_dir/plugins"

source "$tmux_conf_dir/opts.conf"
source "$tmux_conf_dir/keybind.conf"
source "$tmux_conf_dir/skin.conf"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'roosta/tmux-fuzzback'
# set -g @plugin 'tmux-plugins/tmux-copycat'
# set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'tmux-plugins/tmux-online-status'
# set -g @plugin 'tmux-plugins/tmux-cpu'

# set -g @plugin 'icyrainz/tmux-session-wizard#custom'
set -g @plugin 'laktak/extrakto'

set -g @plugin 'icyrainz/tmux-task-monitor#custom'
set -g @plugin 'jtmcginty/tmux-session-dots'

## Plugin options
set -g @resurrect-dir "$tmux_dir/resurrect"
set -g @resurrect-save 'S'                          # Save the session
set -g @resurrect-restore 'L'                       # Reload the session
set -g @resurrect-strategy-nvim 'session'           # Restore Neovim session if a Session.vim file is present
set -g @resurrect-capture-pane-contents 'on' # Allow tmux-ressurect to capture pane contents

# set -g @session-wizard 't'

# extrakto options
set -g @extrakto_fzf_header "i c f g m h"
set -g @extrakto_clip_mode "tmux_osc52"
set -g @extrakto_clip_mode_order "tmux_osc52 buffer bg"
set -g @extrakto_popup_size "70%"
set -g @extrakto_filter_order "word line all"

# task monitor options
set -g @tmux_resource_monitor_width "70%"
set -g @tmux_resource_monitor_height "70%"

set -g @plugin 'icyrainz/tmux-pr-status'
set -g @plugin 'icyrainz/tmux-claude-stats'
set -g @claude-stats-format '%5h{60,90}|%5r'


if "test ! -d $tmux_plugins_dir/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $tmux_plugins_dir/tpm && $tmux_plugins_dir/tpm/bin/install_plugins'"

run '$tmux_plugins_dir/tpm/tpm'

# Start laundry daemon (idempotent — exits if already running)
run-shell -b 'laundry serve'
