color_bg="#2e323b"
color_fg="#282c34"
color_green="#98c379"
color_yellow="#e5c07b"
color_red="#e06c75"
color_blue="#61afef"
color_cyan="#56b6c2"
color_purple="#c678dd"
color_gray="#5c6370"
color_buffer="#939aa3"
color_selection="#3e4452"

set -g @mode_indicator_prefix_prompt "WAIT"
set -g @mode_indicator_prefix_mode_style fg=$color_blue,bold
set -g @mode_indicator_copy_prompt "COPY"
set -g @mode_indicator_copy_mode_style fg=$color_green,bold
set -g @mode_indicator_sync_prompt "SYNC"
set -g @mode_indicator_sync_mode_style fg=$color_red,bold
set -g @mode_indicator_empty_prompt "TMUX"
set -g @mode_indicator_empty_mode_style fg=$color_purple,bold

# tmux-online-status
set -g @route_to_ping "google.com"
set -g @online_icon "#[fg=$color_gray]¾░▒ō"
set -g @offline_icon "#[fg=$color_red]¾░ģø"

# tmux-battery
set -g @batt_icon_charge_tier8 "’ēĆ"
set -g @batt_icon_charge_tier7 "’ēĆ"
set -g @batt_icon_charge_tier6 "’ēü"
set -g @batt_icon_charge_tier5 "’ēü"
set -g @batt_icon_charge_tier4 "’ēé"
set -g @batt_icon_charge_tier3 "’ēé"
set -g @batt_icon_charge_tier2 "’ēā"
set -g @batt_icon_charge_tier1 "’ēā"

set -g @batt_icon_status_charged " "
set -g @batt_icon_status_charging " ’ā¦ "
set -g @batt_icon_status_discharging " "
set -g @batt_icon_status_attached " "
set -g @batt_icon_status_unknown " "

set -g @batt_remain_short true

set -g status on
set -g status-justify centre
set -g status-position bottom
set -g status-left-length 90
set -g status-right-length 90

# Transparent background
set -g status-style bg=default
# set -g status-style "bg=$color_fg"

# set -g window-style ""
# set -g window-active-style ""

set -g pane-active-border fg=$color_cyan,bg=$color_cyan
set -g pane-border-style fg=$color_gray

set -g message-style bg=$color_blue,fg=$color_bg
setw -g window-status-separator "   "
set-window-option -g mode-style bg=$color_purple,fg=$color_bg

set -g status-left "#{tmux_mode_indicator}  #{online_status}  #[fg=$color_gray]%I:%M %p  #{claude_stats}"
set -g status-right "#[fg=$color_purple]#S#{@pr-session-indicator}#[fg=$color_purple] #{session_dots}  #[fg=$color_gray]#h"
setw -g window-status-format "#[fg=$color_gray,italics]#I: #[noitalics]#W#{@pr-indicator}#{@claude-state}"
setw -g window-status-current-format "#[fg=$color_purple,italics]#I: #[fg=$color_buffer,noitalics,bold]#W#{@pr-indicator}#{@claude-state}"
