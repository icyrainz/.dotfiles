# Set prefix key to C-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Swap windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Bind split-window key to better ones
unbind %
bind '\' split-window -h -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"
unbind '"'
bind '-' split-window -v -c "#{pane_current_path}"
bind '_' split-window -v -c "#{pane_current_path}"

# Maximize pane
bind -r m resize-pane -Z

# Kill all panes except current
bind k confirm-before 'kill-pane -a'
bind K 'kill-pane -a'

# Kill pane without confirm
bind X 'kill-pane'

# Kill window (W only, w is used for worktrunk)
bind W confirm-before 'kill-window'

# Worktrunk worktree picker → open in new tmux window
bind w display-popup -E -w 70% -h 70% -d "#{pane_current_path}" "bash ~/.config/tmux/wt-session.sh"

# Copy settings in vi mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection

# Don't exit copy mode after dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Decide whether we're in a Vim process
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" { send-keys C-h } { if-shell -F '#{pane_at_left}'   {} { select-pane -L } }
bind-key -n 'C-j' if-shell "$is_vim" { send-keys C-j } { if-shell -F '#{pane_at_bottom}' {} { select-pane -D } }
bind-key -n 'C-k' if-shell "$is_vim" { send-keys C-k } { if-shell -F '#{pane_at_top}'    {} { select-pane -U } }
bind-key -n 'C-l' if-shell "$is_vim" { send-keys C-l } { if-shell -F '#{pane_at_right}'  {} { select-pane -R } }

bind-key -T copy-mode-vi 'C-h' if-shell -F '#{pane_at_left}'   {} { select-pane -L }
bind-key -T copy-mode-vi 'C-j' if-shell -F '#{pane_at_bottom}' {} { select-pane -D }
bind-key -T copy-mode-vi 'C-k' if-shell -F '#{pane_at_top}'    {} { select-pane -U }
bind-key -T copy-mode-vi 'C-l' if-shell -F '#{pane_at_right}'  {} { select-pane -R }

bind -n 'M-Left' if-shell "$is_vim" 'send-keys M-Left' 'resize-pane -L 5'
bind -n 'M-Down' if-shell "$is_vim" 'send-keys M-Down' 'resize-pane -D 2'
bind -n 'M-Up' if-shell "$is_vim" 'send-keys M-Up' 'resize-pane -U 2'
bind -n 'M-Right' if-shell "$is_vim" 'send-keys M-Right' 'resize-pane -R 5'

bind-key -T copy-mode-vi M-Left resize-pane -L 5
bind-key -T copy-mode-vi M-Down resize-pane -D 2
bind-key -T copy-mode-vi M-Up resize-pane -U 2
bind-key -T copy-mode-vi M-Right resize-pane -R 5

# Fuzzy switch windows in current session
bind f display-popup -E "tmux list-windows -F '#{window_index}: #{window_name}' | fzf --reverse | cut -d: -f1 | xargs tmux select-window -t"

# Sesh session picker (replaces tmux-session-wizard)
bind-key "t" run-shell "bash ~/.config/tmux/sesh-picker.sh"

# Quick toggle to last session
bind-key -n 'C-]' switch-client -l

# Harpoon — pin sessions to slots, jump with Alt+1-4
bind-key -n M-1 run-shell "bash ~/.config/tmux/harpoon.sh goto 1"
bind-key -n M-2 run-shell "bash ~/.config/tmux/harpoon.sh goto 2"
bind-key -n M-3 run-shell "bash ~/.config/tmux/harpoon.sh goto 3"
bind-key -n M-4 run-shell "bash ~/.config/tmux/harpoon.sh goto 4"

# Pin current session to slot: prefix + Alt+1-4
bind-key M-1 run-shell "bash ~/.config/tmux/harpoon.sh mark 1"
bind-key M-2 run-shell "bash ~/.config/tmux/harpoon.sh mark 2"
bind-key M-3 run-shell "bash ~/.config/tmux/harpoon.sh mark 3"
bind-key M-4 run-shell "bash ~/.config/tmux/harpoon.sh mark 4"

# Quick nvim file picker in a floating popup
bind e display-popup -E -w 70% -h 70% -d "#{pane_current_path}" "\
  fd -t f | fzf --preview 'bat --color=always {}' \
    --header '  ^a all  ^g default' \
    --bind 'ctrl-a:reload(fd -t f -H --no-ignore)' \
    --bind 'ctrl-g:reload(fd -t f)' \
  | xargs -r nvim"

# Scratch terminal
bind s display-popup -E -w 70% -h 70% -d "#{pane_current_path}"

# Yazi file manager in a floating popup (nested session to avoid passthrough crash)
bind y display-popup -E -w 70% -h 70% -d "#{pane_current_path}" "tmux new-session yazi \; set status off"

# Lazygit in a floating popup
bind g display-popup -E -w 70% -h 70% -d "#{pane_current_path}" "lazygit"

# Ripgrep search → open in nvim at line
bind "'" display-popup -E -w 70% -h 70% -d "#{pane_current_path}" "bash ~/.config/tmux/rg-edit.sh"

# Tmux doesn't pass <S-CR> codes to Neovim
# https://stackoverflow.com/questions/16359878/how-to-map-shift-enter
bind -n S-Enter send-keys Escape "[13;2u"
