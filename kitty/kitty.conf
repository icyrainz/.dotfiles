font_family      family="Iosevka Term"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16.0

# Use Symbols Nerd Font for icons (fixes small icons with Iosevka)
# Full Nerd Fonts v3.3.0 glyph ranges
symbol_map U+e000-U+e00a,U+e0a0-U+e0a2,U+e0a3,U+e0b0-U+e0b3,U+e0b4-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ea60-U+ec1e,U+ed00-U+f2ff,U+f300-U+f381,U+f400-U+f533,U+f500-U+fd46,U+ee00-U+ee0b,U+f0001-U+f1af0,U+23fb-U+23fe,U+2665,U+26a1,U+2b58,U+276c-U+2771 Symbols Nerd Font Mono

background_opacity 0.94

hide_window_decorations yes

scrollback_lines 1000000

map ctrl+shift+t no_op

# Send escape sequence for Shift+Enter (newline in Claude Code)
map shift+enter send_text all \x1b[13;2u
