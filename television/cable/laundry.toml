[metadata]
name = "laundry"
description = "Task list — jump to Claude workspaces"

[source]
command = [
  "laundry list --format tv",       # active/pending/paused (default)
  "laundry list --all --format tv", # all tasks including completed/cancelled
]
no_sort = true
ansi = true

[preview]
command = ["laundry show '{split:\t:0}'", "laundry pane '{split:\t:0}'"]

[keybindings]
enter = "actions:1-open"
ctrl-x = "toggle_action_picker"

[actions.1-open]
description = "Open / jump to task"
command = "laundry open '{split:\t:0}'"
mode = "execute"

[actions.2-pause]
description = "Pause task"
command = "laundry pause '{split:\t:0}'"
mode = "execute"

[actions.3-done]
description = "Mark complete"
command = "laundry done '{split:\t:0}'"
mode = "execute"

[actions.4-cancel]
description = "Cancel task"
command = "laundry cancel '{split:\t:0}'"
mode = "execute"
