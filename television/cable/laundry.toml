[metadata]
name = "laundry"
description = "Task list — jump to Claude workspaces"

[source]
command = [
  "laundry list --format tv",            # active + paused
  "laundry list --all --format tv",      # all including completed/cancelled
]
no_sort = true
ansi = true

[preview]
command = [
  "laundry show '{split: :0}'",
  "laundry pane '{split: :0}'",
  "bash ~/.config/laundry/laundry-pr-preview.sh '{split: :0}'",
]

[keybindings]
enter = "actions:1-open"
ctrl-x = "toggle_action_picker"

[actions.1-open]
description = "Open / jump to task"
command = "laundry open '{split: :0}'"
mode = "execute"

[actions.2-pause]
description = "Pause task"
command = "laundry pause '{split: :0}'"

[actions.3-done]
description = "Mark complete"
command = "laundry done '{split: :0}'"

[actions.4-cancel]
description = "Cancel task"
command = "laundry cancel '{split: :0}'"

[actions.5-delete]
description = "Delete task"
command = "laundry delete -y '{split: :0}'"

[actions.h1-pin1]
description = "Pin → harpoon [1]"
command = "bash ~/.config/tmux/harpoon.sh pin 1 '{split: :0}'"

[actions.h2-pin2]
description = "Pin → harpoon [2]"
command = "bash ~/.config/tmux/harpoon.sh pin 2 '{split: :0}'"

[actions.h3-pin3]
description = "Pin → harpoon [3]"
command = "bash ~/.config/tmux/harpoon.sh pin 3 '{split: :0}'"

[actions.h4-pin4]
description = "Pin → harpoon [4]"
command = "bash ~/.config/tmux/harpoon.sh pin 4 '{split: :0}'"
